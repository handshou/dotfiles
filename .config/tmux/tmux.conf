# https://www.youtube.com/watch?v=DzNmUNvnB04
# enable true color
set-option -sa terminal-overrides ",xterm*:Tc"
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# enable xterm-style key sequences
set -g xterm-keys on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'craftzdog/tmux-claude-session-manager'

# theme
# https://github.com/janoamaral/tokyo-night-tmux
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_wbg 1
set -g @tokyo-night-tmux_netspeed_iface 'en0'   # Detected via default route
set -g @tokyo-night-tmux_netspeed_showip 0      # Display IPv4 address (default 0)
set -g @tokyo-night-tmux_netspeed_refresh 15     # Update interval in seconds (default 1)
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style none
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_date_format YMD
set -g @tokyo-night-tmux_time_format 12H
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_path_format relative # Options: 'relative', 'full', or 'absolute'
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name InternalBattery-0
set -g @tokyo-night-tmux_battery_low_threshold 21

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# close gaps in window numbering when a window is killed
set -g renumber-windows on

# allow mouse window resize
set -g mouse on

# set vi-mode
set-window-option -g mode-keys vi

# run '~/.tmux/plugins/tpm/tpm'
run '/opt/homebrew/opt/tpm/share/tpm/tpm'

# Replace plugin's battery widget call with our wrapper (hides at 100% on AC)
run-shell 'tmux set -g status-right "$(tmux show-options -gv status-right | sed s,plugins/tokyo-night-tmux/src/battery-widget.sh,battery-widget.sh,)"'

# Keep the window titles updating dynamically as you switch directories
set -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Window list — [PR#] when an open GitHub PR exists for the branch,
# otherwise folder basename. Same content on active and inactive; styling
# distinguishes them. Flat-minimalist tokyonight.
set -g window-status-format         " #I  #(/Users/h/.config/tmux/window-title.sh '#{pane_current_path}') "
set -g window-status-current-format " #I  #(/Users/h/.config/tmux/window-title.sh '#{pane_current_path}') "

set -g window-status-style         "fg=#565f89,bg=default"
set -g window-status-current-style "fg=#7aa2f7,bg=default,bold"

set -g window-status-separator " "

bind-key -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/Developer/TODO.md"

bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer/tmux-sessionizer"

bind-key -r S setw synchronize-panes

set -g extended-keys on
